<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>METE 451 Quiz</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div id="root"></div>
    
    <script type="text/babel">
      const { useState, useEffect } = React;
      
      const AlertCircle = ({ className }) => (
        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="8" x2="12" y2="12" />
          <line x1="12" y1="16" x2="12.01" y2="16" />
        </svg>
      );
      
      const Lock = ({ className }) => (
        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
      );
      
      const CheckCircle = ({ className }) => (
        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
          <polyline points="22 4 12 14.01 9 11.01" />
        </svg>
      );
      
      const Timer = ({ className }) => (
        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <circle cx="12" cy="12" r="10" />
          <polyline points="12 6 12 12 16 14" />
        </svg>
      );

      const QuizApp = () => {
        const [view, setView] = useState("start");
        const [studentName, setStudentName] = useState("");
        const [indexNumber, setIndexNumber] = useState("");
        const [currentQuestion, setCurrentQuestion] = useState(0);
        const [answers, setAnswers] = useState({});
        const [questionTimeLeft, setQuestionTimeLeft] = useState(30);
        const [tabSwitches, setTabSwitches] = useState(0);
        const [quizSubmitted, setQuizSubmitted] = useState(false);
        const [adminPassword, setAdminPassword] = useState("");
        const [showAdminLogin, setShowAdminLogin] = useState(false);

        const questions = [
          {
            id: 1,
            question: "Hydrocyclones primarily replace which force during classification?",
            options: [
              "a. Gravitational force with linear acceleration",
              "b. Gravitational force with centrifugal force",
              "c. Centrifugal force with gravitational force",
              "d. Drag force with pressure force",
            ],
            correctAnswer: "b. Gravitational force with centrifugal force",
          },
          {
            id: 2,
            question: "The practical particle size range (40–400 µm) implies that cyclones are:",
            options: [
              "a. Inefficient below 40 µm due to low velocity",
              "b. Less effective for extremely fine particles due to fluid effects",
              "c. Ineffective above 400 µm due to turbulence",
              "d. Equally effective across all particle sizes",
            ],
            correctAnswer: "b. Less effective for extremely fine particles due to fluid effects",
          },
          {
            id: 3,
            question: "A change from tangential to involute feed entry MOST directly affects:",
            options: [
              "a. Particle density",
              "b. Velocity distribution inside the cyclone",
              "c. Apex diameter",
              "d. Pressure drop",
            ],
            correctAnswer: "b. Velocity distribution inside the cyclone",
          },
          {
            id: 4,
            question: "The vortex finder primarily functions to:",
            options: [
              "a. Increase centrifugal force",
              "b. Remove coarse particles",
              "c. Extract fine particles from the system",
              "d. Reduce feed velocity",
            ],
            correctAnswer: "c. Extract fine particles from the system",
          },
          {
            id: 5,
            question: "If the vortex finder extends further below the feed chamber than normal, the MOST likely effect is:",
            options: [
              "a. Increased coarse recovery in overflow",
              "b. Increased short-circuiting of fine particles",
              "c. Reduced classification efficiency",
              "d. No significant effect",
            ],
            correctAnswer: "b. Increased short-circuiting of fine particles",
          },
          {
            id: 6,
            question: "The inverted conical section mainly contributes to:",
            options: [
              "a. Feed entry velocity",
              "b. Retention time and particle separation",
              "c. Pressure reduction",
              "d. Slurry dilution",
            ],
            correctAnswer: "b. Retention time and particle separation",
          },
          {
            id: 7,
            question: "Which statement about cyclone lining is MOST precise?",
            options: [
              "a. Linings reduce turbulence only",
              "b. Linings primarily prevent corrosion and wear",
              "c. Linings control particle size distribution",
              "d. Linings regulate pressure drop",
            ],
            correctAnswer: "b. Linings primarily prevent corrosion and wear",
          },
          {
            id: 8,
            question: "If the apex diameter becomes smaller than 10% of cyclone diameter, the MOST probable result is:",
            options: [
              "a. Increased overflow rate",
              "b. Blockage and unstable operation",
              "c. Reduced pressure drop",
              "d. Improved classification",
            ],
            correctAnswer: "b. Blockage and unstable operation",
          },
          {
            id: 9,
            question: "The inlet nozzle area being 6–8% of feed chamber area ensures:",
            options: [
              "a. Constant particle size",
              "b. Proper velocity and flow conditions",
              "c. Maximum pressure drop",
              "d. Minimal wear",
            ],
            correctAnswer: "b. Proper velocity and flow conditions",
          },
          {
            id: 10,
            question: "Which ratio distortion would MOST likely cause malfunction first?",
            options: [
              "a. Slight increase in cyclone diameter",
              "b. Small change in cone angle",
              "c. Significant deviation in apex-to-vortex finder ratio",
              "d. Minor change in lining material",
            ],
            correctAnswer: "c. Significant deviation in apex-to-vortex finder ratio",
          },
          {
            id: 11,
            question: "Increasing cylindrical section length primarily affects:",
            options: [
              "a. Feed pressure",
              "b. Retention time",
              "c. Particle density",
              "d. Vortex formation",
            ],
            correctAnswer: "b. Retention time",
          },
          {
            id: 12,
            question: "The D50C cut size represents the particle size at which:",
            options: [
              "a. All particles report to overflow",
              "b. 50% report to overflow and 50% to underflow",
              "c. Only fine particles are recovered",
              "d. Maximum efficiency is achieved",
            ],
            correctAnswer: "b. 50% report to overflow and 50% to underflow",
          },
          {
            id: 13,
            question: "If D50C shifts to a larger size, the recovery curve will:",
            options: [
              "a. Shift left",
              "b. Shift right",
              "c. Remain unchanged",
              "d. Collapse vertically",
            ],
            correctAnswer: "b. Shift right",
          },
          {
            id: 14,
            question: "Dividing particle size by D50C to obtain a reduced recovery curve mainly allows:",
            options: [
              "a. Elimination of density effects",
              "b. Standardization across different operating conditions",
              "c. Reduction in pressure drop",
              "d. Direct measurement of efficiency",
            ],
            correctAnswer: "b. Standardization across different operating conditions",
          },
          {
            id: 15,
            question: "Under base conditions (water, low solids, standard geometry), cyclone performance is MOST sensitive to:",
            options: [
              "a. Feed color",
              "b. Pressure drop",
              "c. Lining material",
              "d. Ambient temperature",
            ],
            correctAnswer: "b. Pressure drop",
          },
          {
            id: 16,
            question: "Two tanks have the same slurry volume, but one has a higher residence time. Which statement is most correct?",
            options: [
              "a. Both require equal number of tanks",
              "b. Higher residence time increases total tank volume",
              "c. Slurry volume alone determines tank number",
              "d. Residence time has no effect",
            ],
            correctAnswer: "b. Higher residence time increases total tank volume",
          },
          {
            id: 17,
            question: "If pulp density increases while dry tonnage remains constant, what happens to slurry volume?",
            options: [
              "a. Increases",
              "b. Decreases",
              "c. Remains constant",
              "d. Doubles",
            ],
            correctAnswer: "b. Decreases",
          },
          {
            id: 18,
            question: "Which variable directly affects both tank size and number of tanks simultaneously?",
            options: [
              "a. Ore color",
              "b. Residence time",
              "c. Crusher speed",
              "d. Electrical signals",
            ],
            correctAnswer: "b. Residence time",
          },
          {
            id: 19,
            question: "A small error in pulp density will MOST directly affect:",
            options: [
              "a. Crusher settings",
              "b. Dry mass calculation",
              "c. Mill speed",
              "d. Power supply",
            ],
            correctAnswer: "b. Dry mass calculation",
          },
          {
            id: 20,
            question: "Which is TRUE about regulatory control?",
            options: [
              "a. Uses expert judgement only",
              "b. Works without set points",
              "c. Maintains variables at defined values",
              "d. Ignores disturbances",
            ],
            correctAnswer: "c. Maintains variables at defined values",
          },
        ];

        const ADMIN_PASSWORD = "admin123";
        const TIME_PER_QUESTION = 30;
        const TAB_SWITCH_PENALTY = 0.5;

        useEffect(() => {
          if (view === "quiz") {
            const handleContextMenu = (e) => e.preventDefault();
            document.addEventListener("contextmenu", handleContextMenu);
            document.body.style.userSelect = "none";
            document.body.style.webkitUserSelect = "none";
            const handleVisibilityChange = () => {
              if (document.hidden) setTabSwitches((prev) => prev + 1);
            };
            document.addEventListener("visibilitychange", handleVisibilityChange);
            const handleCopy = (e) => e.preventDefault();
            document.addEventListener("copy", handleCopy);
            document.addEventListener("cut", handleCopy);
            document.addEventListener("paste", handleCopy);
            return () => {
              document.removeEventListener("contextmenu", handleContextMenu);
              document.removeEventListener("visibilitychange", handleVisibilityChange);
              document.removeEventListener("copy", handleCopy);
              document.removeEventListener("cut", handleCopy);
              document.removeEventListener("paste", handleCopy);
              document.body.style.userSelect = "auto";
              document.body.style.webkitUserSelect = "auto";
            };
          }
        }, [view]);

        useEffect(() => {
          if (view === "quiz" && questionTimeLeft > 0) {
            const timer = setTimeout(() => setQuestionTimeLeft((prev) => prev - 1), 1000);
            return () => clearTimeout(timer);
          } else if (view === "quiz" && questionTimeLeft === 0) {
            handleAutoNext();
          }
        }, [view, questionTimeLeft]);

        const handleAutoNext = () => {
          if (currentQuestion < questions.length - 1) {
            setCurrentQuestion((prev) => prev + 1);
            setQuestionTimeLeft(TIME_PER_QUESTION);
          } else {
            handleSubmitQuiz();
          }
        };

        const handleStartQuiz = async () => {
          if (!studentName.trim() || !indexNumber.trim()) {
            alert("Please enter your name and index number");
            return;
          }
          const startButton = document.querySelector("button");
          if (startButton) startButton.disabled = true;
          try {
            const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzQ49ebOvpIuttMBXh7gkCRU857mK6T0Hr3v4yiEisPzHjwHdaPFyD744kWGVu81KymqA/exec";
            const response = await fetch(`${GOOGLE_SCRIPT_URL}?sheet=Sheet1`);
            const data = await response.json();
            const alreadyTaken = data.some((record) => String(record.indexNumber).trim() === String(indexNumber).trim());
            if (alreadyTaken) {
              alert("This index number has already been used to take the quiz. You cannot take the quiz again.");
              if (startButton) startButton.disabled = false;
              return;
            }
            setView("quiz");
            setQuestionTimeLeft(TIME_PER_QUESTION);
          } catch (error) {
            console.error("Error checking index number:", error);
            alert("Error checking records. Please try again or contact your instructor.");
            if (startButton) startButton.disabled = false;
          }
        };

        const handleAnswerChange = (questionId, answer) => {
          setAnswers((prev) => ({ ...prev, [questionId]: answer }));
        };

        const calculateScore = () => {
          let correct = 0;
          questions.forEach((q) => {
            if (answers[q.id] === q.correctAnswer) correct++;
          });
          const tabPenalty = tabSwitches * TAB_SWITCH_PENALTY;
          const finalScore = Math.max(0, correct - tabPenalty);
          return { rawScore: correct, tabPenalty, finalScore };
        };

        const handleSubmitQuiz = async () => {
          if (quizSubmitted) return;
          const { rawScore, tabPenalty, finalScore } = calculateScore();
          const totalQuestions = questions.length;
          const percentage = ((finalScore / totalQuestions) * 100).toFixed(1);
          const result = {
            studentName, indexNumber,
            department: "metallurgical",
            sheet: "Sheet1",
            rawScore, tabSwitches, tabPenalty, finalScore, totalQuestions, percentage,
            timestamp: new Date().toLocaleString(),
          };
          setQuizSubmitted(true);
          try {
            const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzQ49ebOvpIuttMBXh7gkCRU857mK6T0Hr3v4yiEisPzHjwHdaPFyD744kWGVu81KymqA/exec";
            await fetch(GOOGLE_SCRIPT_URL, {
              method: "POST", mode: "no-cors",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(result),
            });
          } catch (error) {
            console.error("Error submitting results:", error);
          }
          setView("thankyou");
        };

        const handleAdminLogin = () => {
          if (adminPassword === ADMIN_PASSWORD) setView("admin");
          else alert("Incorrect password");
        };

        const AdminView = () => {
          const [results, setResults] = useState([]);
          const [loading, setLoading] = useState(true);

          useEffect(() => { loadResultsFromSheets(); }, []);

          const loadResultsFromSheets = async () => {
            setLoading(true);
            try {
              const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzQ49ebOvpIuttMBXh7gkCRU857mK6T0Hr3v4yiEisPzHjwHdaPFyD744kWGVu81KymqA/exec";
              const response = await fetch(`${GOOGLE_SCRIPT_URL}?sheet=Sheet1`);
              const data = await response.json();
              setResults(data.filter(record => !record.sheet || record.sheet === 'Sheet1'));
              setLoading(false);
            } catch (error) {
              console.error("Error loading results:", error);
              setLoading(false);
            }
          };

          const calculateStats = () => {
            if (results.length === 0) return { highest: 0, average: 0, lowest: 0 };
            const scores = results.map((r) => {
              const n = typeof r.finalScore === 'string' ? parseFloat(r.finalScore.toString().split("/")[0]) : parseFloat(r.finalScore);
              return isNaN(n) ? 0 : n;
            });
            return {
              highest: Math.max(...scores),
              lowest: Math.min(...scores),
              average: (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1),
            };
          };

          const stats = calculateStats();

          return (
            <div className="min-h-screen bg-gray-50 p-6">
              <div className="max-w-7xl mx-auto">
                <div className="bg-white rounded-lg shadow-md p-6 mb-6">
                  <div className="flex justify-between items-center mb-4">
                    <h2 className="text-2xl font-bold">Admin Dashboard - METE 451 Quiz</h2>
                    <div className="flex gap-2">
                      <button onClick={() => loadResultsFromSheets()} className="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">Refresh</button>
                      <button onClick={() => setView("start")} className="px-4 py-2 bg-gray-500 text-white rounded hover:bg-gray-600">Exit Admin</button>
                    </div>
                  </div>
                  {loading ? (
                    <p>Loading results from Google Sheets...</p>
                  ) : results.length === 0 ? (
                    <p className="text-gray-500">No quiz submissions yet.</p>
                  ) : (
                    <>
                      <div className="mb-4">
                        <p className="text-lg font-semibold text-gray-700">Metallurgical Engineering — Hydrocyclone, Classification & Control Quiz</p>
                      </div>
                      <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                        <div className="bg-blue-50 rounded-lg p-4">
                          <p className="text-sm text-blue-600 font-semibold mb-1">Total Submissions</p>
                          <p className="text-3xl font-bold text-blue-700">{results.length}</p>
                        </div>
                        <div className="bg-green-50 rounded-lg p-4">
                          <p className="text-sm text-green-600 font-semibold mb-1">Highest Score</p>
                          <p className="text-3xl font-bold text-green-700">{stats.highest}/20</p>
                        </div>
                        <div className="bg-yellow-50 rounded-lg p-4">
                          <p className="text-sm text-yellow-600 font-semibold mb-1">Average Score</p>
                          <p className="text-3xl font-bold text-yellow-700">{stats.average}/20</p>
                        </div>
                        <div className="bg-red-50 rounded-lg p-4">
                          <p className="text-sm text-red-600 font-semibold mb-1">Lowest Score</p>
                          <p className="text-3xl font-bold text-red-700">{stats.lowest}/20</p>
                        </div>
                      </div>
                      <div className="mb-4">
                        <p className="text-xs text-gray-500">Data synced with Google Sheets (Sheet1) | Each tab switch = -0.5 points penalty</p>
                      </div>
                      <div className="overflow-x-auto">
                        <table className="min-w-full divide-y divide-gray-200">
                          <thead className="bg-gray-50">
                            <tr>
                              {["#","Name","Index Number","Raw Score","Tab Switches","Penalty","Final Score","Percentage","Timestamp"].map(h => (
                                <th key={h} className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">{h}</th>
                              ))}
                            </tr>
                          </thead>
                          <tbody className="bg-white divide-y divide-gray-200">
                            {results.map((result, idx) => (
                              <tr key={idx}>
                                <td className="px-4 py-4 whitespace-nowrap text-sm font-semibold text-gray-600">{idx + 1}</td>
                                <td className="px-4 py-4 whitespace-nowrap text-sm">{result.studentName}</td>
                                <td className="px-4 py-4 whitespace-nowrap text-sm">{result.indexNumber}</td>
                                <td className="px-4 py-4 whitespace-nowrap text-sm font-semibold">{result.rawScore}</td>
                                <td className="px-4 py-4 whitespace-nowrap text-sm">{result.tabSwitches}</td>
                                <td className="px-4 py-4 whitespace-nowrap text-sm text-red-600">{result.tabPenalty}</td>
                                <td className="px-4 py-4 whitespace-nowrap text-sm"><span className="font-bold text-indigo-600">{result.finalScore}</span></td>
                                <td className="px-4 py-4 whitespace-nowrap"><span className="px-2 py-1 rounded text-sm font-semibold bg-gray-100 text-gray-800">{result.percentage}%</span></td>
                                <td className="px-4 py-4 whitespace-nowrap text-xs text-gray-500">{result.timestamp}</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </>
                  )}
                </div>
                <div className="text-center mt-6"><p className="text-sm text-gray-500">©Team Benny</p></div>
              </div>
            </div>
          );
        };

        if (view === "admin") return <AdminView />;

        if (view === "start") {
          return (
            <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
              <div className="max-w-md w-full">
                <div className="bg-white rounded-lg shadow-xl p-8">
                  <div className="text-center mb-6">
                    <Lock className="mx-auto h-12 w-12 text-indigo-600 mb-3" />
                    <h1 className="text-3xl font-bold text-gray-800 mb-2">METE 451 Quiz</h1>
                    <p className="text-gray-600">Metallurgical Engineering</p>
                    <p className="text-sm text-gray-500 mt-1">Hydrocyclone, Classification & Process Control</p>
                  </div>
                  <div className="bg-yellow-50 border-l-4 border-yellow-400 p-4 mb-6">
                    <div className="flex">
                      <AlertCircle className="h-5 w-5 text-yellow-400 mr-2 flex-shrink-0" />
                      <div className="text-sm text-yellow-700">
                        <p className="font-semibold mb-1">Quiz Rules:</p>
                        <ul className="list-disc list-inside space-y-1">
                          <li>20 questions total</li>
                          <li>30 seconds per question</li>
                          <li>Auto-advances when time expires</li>
                          <li>Tab switching: -0.5 points each</li>
                          <li>Text selection disabled</li>
                          <li>Right-click disabled</li>
                        </ul>
                      </div>
                    </div>
                  </div>
                  <div className="space-y-4">
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                      <input type="text" value={studentName} onChange={(e) => setStudentName(e.target.value)}
                        className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                        placeholder="Enter your full name" />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">Index Number</label>
                      <input type="text" value={indexNumber} onChange={(e) => setIndexNumber(e.target.value)}
                        className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                        placeholder="Enter your index number" />
                    </div>
                    <button onClick={handleStartQuiz} className="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition duration-200">
                      Start Quiz
                    </button>
                    <button onClick={() => setShowAdminLogin(!showAdminLogin)} className="w-full text-sm text-gray-500 hover:text-gray-700 mt-4">
                      {showAdminLogin ? "Hide Admin Login" : "Admin Login"}
                    </button>
                    {showAdminLogin && (
                      <div className="mt-4 p-4 bg-gray-50 rounded-lg">
                        <input type="password" value={adminPassword} onChange={(e) => setAdminPassword(e.target.value)}
                          placeholder="Admin Password" className="w-full px-4 py-2 border border-gray-300 rounded-lg mb-2" />
                        <button onClick={handleAdminLogin} className="w-full bg-gray-600 text-white py-2 rounded-lg hover:bg-gray-700">Login as Admin</button>
                      </div>
                    )}
                  </div>
                </div>
                <div className="text-center mt-6"><p className="text-sm text-gray-400">©Team Benny</p></div>
              </div>
            </div>
          );
        }

        if (view === "thankyou") {
          return (
            <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
              <div className="max-w-md w-full">
                <div className="bg-white rounded-lg shadow-xl p-8">
                  <div className="text-center">
                    <CheckCircle className="mx-auto h-16 w-16 text-green-500 mb-4" />
                    <h2 className="text-3xl font-bold text-gray-800 mb-2">Quiz Submitted Successfully!</h2>
                    <p className="text-gray-600 mb-6">Thank you, {studentName}</p>
                    <div className="bg-blue-50 rounded-lg p-6 mb-6">
                      <p className="text-gray-700 text-lg">Your responses have been recorded and submitted to your instructor.</p>
                    </div>
                    <p className="text-sm text-gray-500">Results will be shared by your instructor.</p>
                  </div>
                </div>
                <div className="text-center mt-6"><p className="text-sm text-gray-400">©Team Benny</p></div>
              </div>
            </div>
          );
        }

        const question = questions[currentQuestion];
        const progress = ((currentQuestion + 1) / questions.length) * 100;
        const timerPercent = (questionTimeLeft / TIME_PER_QUESTION) * 100;

        const handleNext = () => {
          if (currentQuestion < questions.length - 1) {
            setCurrentQuestion((prev) => prev + 1);
            setQuestionTimeLeft(TIME_PER_QUESTION);
          } else {
            handleSubmitQuiz();
          }
        };

        return (
          <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
            <div className="max-w-3xl mx-auto">
              {/* Header bar */}
              <div className="bg-white rounded-lg shadow-md p-4 mb-4">
                <div className="flex justify-between items-center mb-3">
                  <div className="flex items-center space-x-3">
                    <span className="text-sm font-semibold text-gray-700">{studentName} ({indexNumber})</span>
                    <span className="text-xs px-2 py-1 bg-indigo-100 text-indigo-800 rounded">METE 451</span>
                  </div>
                  <div className="flex items-center space-x-3">
                    {tabSwitches > 0 && (
                      <span className="text-sm text-red-600 font-semibold">⚠️ Switches: {tabSwitches} (-{(tabSwitches * TAB_SWITCH_PENALTY).toFixed(1)})</span>
                    )}
                    <div className="flex items-center space-x-2">
                      <Timer className={`h-5 w-5 ${questionTimeLeft <= 8 ? "text-red-600" : questionTimeLeft <= 15 ? "text-orange-500" : "text-indigo-600"}`} />
                      <span className={`font-mono font-bold text-2xl ${questionTimeLeft <= 8 ? "text-red-600 animate-pulse" : questionTimeLeft <= 15 ? "text-orange-500" : "text-gray-700"}`}>
                        {questionTimeLeft}s
                      </span>
                    </div>
                  </div>
                </div>
                {/* Timer progress bar */}
                <div className="w-full bg-gray-200 rounded-full h-1.5 mb-2">
                  <div
                    className={`h-1.5 rounded-full transition-all duration-1000 ${questionTimeLeft <= 8 ? "bg-red-500" : questionTimeLeft <= 15 ? "bg-orange-400" : "bg-indigo-600"}`}
                    style={{ width: `${timerPercent}%` }}
                  />
                </div>
                <div className="flex justify-between text-sm text-gray-500">
                  <span>Question {currentQuestion + 1} of {questions.length}</span>
                  <span>{Math.round(progress)}% complete</span>
                </div>
                {/* Progress bar */}
                <div className="w-full bg-gray-200 rounded-full h-2 mt-1">
                  <div className="bg-indigo-600 h-2 rounded-full transition-all duration-300" style={{ width: `${progress}%` }} />
                </div>
              </div>

              {/* Question card */}
              <div className="bg-white rounded-lg shadow-md p-8">
                <div className="flex items-start mb-6">
                  <span className="flex-shrink-0 bg-indigo-600 text-white text-sm font-bold w-8 h-8 rounded-full flex items-center justify-center mr-4 mt-0.5">
                    {currentQuestion + 1}
                  </span>
                  <h2 className="text-lg font-bold text-gray-800 leading-relaxed">{question.question}</h2>
                </div>

                <div className="space-y-3">
                  {question.options.map((option, idx) => {
                    const isSelected = answers[question.id] === option;
                    return (
                      <label
                        key={idx}
                        className={`flex items-start p-4 border-2 rounded-lg cursor-pointer transition duration-200 ${
                          isSelected
                            ? "border-indigo-500 bg-indigo-50"
                            : "border-gray-200 hover:border-indigo-400 hover:bg-indigo-50"
                        }`}
                      >
                        <input
                          type="radio"
                          name={`question-${question.id}`}
                          value={option}
                          checked={isSelected}
                          onChange={(e) => handleAnswerChange(question.id, e.target.value)}
                          className="sr-only"
                        />
                        <span className={`flex-shrink-0 w-6 h-6 rounded-full border-2 flex items-center justify-center mr-3 mt-0.5 text-xs font-bold transition-colors ${
                          isSelected ? "bg-indigo-600 border-indigo-600 text-white" : "border-gray-400 text-gray-500"
                        }`}>
                          {['A','B','C','D'][idx]}
                        </span>
                        <span className={`text-base ${isSelected ? "text-indigo-900 font-semibold" : "text-gray-700"}`}>
                          {option.substring(3)}
                        </span>
                      </label>
                    );
                  })}
                </div>

                <div className="flex justify-between items-center mt-8">
                  <span className="text-sm text-gray-400">
                    {answers[question.id] ? "✓ Answer selected" : "No answer selected"}
                  </span>
                  <button
                    onClick={handleNext}
                    className={`px-8 py-3 rounded-lg font-semibold transition duration-200 ${
                      currentQuestion === questions.length - 1
                        ? "bg-green-600 hover:bg-green-700"
                        : "bg-indigo-600 hover:bg-indigo-700"
                    } text-white`}
                  >
                    {currentQuestion === questions.length - 1 ? "Submit Quiz" : "Next →"}
                  </button>
                </div>
              </div>

              <div className="text-center mt-6"><p className="text-sm text-gray-400">©Team Benny</p></div>
            </div>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<QuizApp />);
    </script>
  </body>
</html>
